<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Salary Calculator</title>

  <!-- CSS Link -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Salary Calculator</h1>

    <label>Daily Wage</label>
    <input type="number" id="dailyWage">
    <!-- Working Days -->
    <label>Total Working Days</label>
    <input type="number" id="workingDays">

    <!-- Shift -->
    <label>Shift Type</label>
    <select id="shift">
      <option value="day">Day Shift</option>
      <option value="night">Night Shift</option>
    </select>


    <!-- Public Holiday OT -->
    <label>Public Holiday OT Hours</label>
    <input type="number" id="phOT">

    <!-- Public Holiday Extra -->
    <label>Public Holiday Extra OT (3x)</label>
    <input type="number" id="phExtraOT">

    <!-- Off Day OT -->
    <label>Off Day OT Hours</label>
    <input type="number" id="offOT">

    <!-- Off Day Extra -->
    <label>Off Day Extra OT (3x)</label>
    <input type="number" id="offExtraOT">

    <!-- Normal Day OT -->
    <label>Normal OT Hours</label>
    <input type="number" id="normalOT">

    <!-- Absent -->
    <label>Absent Days (First 15 Days)</label>
    <input type="number" id="absent1">

    <label>Absent Days (Second 15 Days)</label>
    <input type="number" id="absent2">

    <!-- KPI -->
    <label>KPI Bonus</label>
    <input type="number" id="kpi">

    <!-- Other Bonus -->
    <label>Other Bonus</label>
    <input type="number" id="otherBonus">

    <label>Electricity Bill</label>
    <input type="number" id="eBill">
    <!-- Button -->
    <button type="button" onclick="calculateSalary()">
      Calculate Salary
    </button>

    <!-- Result -->
    <div class="result" id="result">

    </div>

  </div>

  <!-- JS Link -->
  <script src="script.js"></script>

</body>
</html>
